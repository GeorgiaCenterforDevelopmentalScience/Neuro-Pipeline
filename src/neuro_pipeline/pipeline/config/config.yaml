# Analysis and Prep Pipeline

prep:
  - name: unzip
    profile: standard
    scripts: [unzip_rename.sh]
    output_pattern: "{base_output}/raw"

  - name: recon_bids
    profile: light_short
    array: true
    scripts: [dcm2bids_convert_BIDS.sh]
    input_from: unzip
    output_pattern: "{base_output}/BIDS"

# Intermed MRI (intermediate step required by staged pipelines)
intermed:
  - name: afni_volume
    profile: standard_short
    array: true
    input_from: recon_bids
    scripts: [sswarp_scratch.sh]
    output_pattern: "{base_output}/AFNI_derivatives"

# BIDS-native containerized pipelines (2-step: recon_bids → task)
# Add new BIDS pipelines as subsections here
rest:
  - name: rest_preprocess
    stage: prep
    profile: heavy_long
    array: true
    input_from: recon_bids
    scripts: [fmriprep_rs.sh]
    output_pattern: "{base_output}/BIDS_derivatives/fmriprep"

  - name: rest_post
    stage: post
    profile: standard_short
    array: true
    input_from: rest_preprocess
    scripts: [xcpd_rs.sh]
    output_pattern: "{base_output}/BIDS_derivatives/xcpd"

dwi:
  - name: dwi_preprocess
    stage: prep
    profile: standard
    array: true
    input_from: recon_bids
    scripts: [qsiprep.sh]
    output_pattern: "{base_output}/BIDS_derivatives/qsiprep"

  - name: dwi_post
    stage: post
    profile: standard
    array: true
    input_from: dwi_preprocess
    scripts: [qsirecon.sh]
    output_pattern: "{base_output}/BIDS_derivatives/qsirecon"

# Staged pipelines (3-step: recon_bids → intermed → task)
# Add new tasks here; reference by short name in --staged-prep/post
cards:
  - name: cards_preprocess
    stage: prep
    profile: standard
    array: true
    input_from: recon_bids
    multi_stage: true
    scripts: [afni_cards_preprocessing.sh]
    output_pattern: "{base_output}/AFNI_derivatives"

kidvid:
  - name: kidvid_preprocess
    stage: prep
    profile: standard
    array: true
    input_from: recon_bids
    multi_stage: true
    scripts: [afni_kidvid_preprocess.sh]
    output_pattern: "{base_output}/AFNI_derivatives"

# Quality control
qc:
  - name: mriqc_preprocess
    stage: prep
    profile: heavy_long
    array: true
    input_from: recon_bids
    scripts: [mriqc_individual.sh]
    output_pattern: "{base_output}/quality_control/mriqc"

  - name: mriqc_post
    stage: post
    profile: light_short
    input_from: recon_bids
    scripts: [mriqc_group.sh]
    output_pattern: "{base_output}/quality_control/mriqc"

# Array job configuration
array_config:
  pattern: "1-{num}%15"
