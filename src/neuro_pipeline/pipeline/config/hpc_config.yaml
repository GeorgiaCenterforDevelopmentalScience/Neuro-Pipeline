# HPC Scheduler Configuration
# Set `scheduler` to match your cluster's job scheduler.
# Supported: slurm, pbs

scheduler: slurm

# Default resource settings applied to all profiles unless overridden.
# Add a per-profile `partition` key to override for that profile only
# (e.g. heavy_long on a bigmem partition).
defaults:
  partition: "batch"

# Resource profiles — each profile can override any default value.
resource_profiles:
  data_manage:
    memory: "2gb"
    time: "00:20:00"
    nodes: 1
    ntasks: 1
    cpus_per_task: 16

  light_short:
    memory: "16gb"
    time: "04:00:00"
    nodes: 1
    ntasks: 1
    cpus_per_task: 16

  standard:
    memory: "32gb"
    time: "20:00:00"
    nodes: 1
    ntasks: 1
    cpus_per_task: 16

  standard_short:
    memory: "32gb"
    time: "08:00:00"
    nodes: 1
    ntasks: 1
    cpus_per_task: 16

  heavy_long:
    memory: "64gb"
    time: "24:00:00"
    nodes: 1
    ntasks: 1
    cpus_per_task: 16

slurm:
  # Submission
  submit_cmd: sbatch
  # job_id_parse: how to extract job id from submit stdout
  #   last_word  → "Submitted batch job 12345"  →  "12345"
  job_id_parse: last_word

  # Dependency between jobs (use {jobs} as placeholder for colon-joined ids)
  dependency_flag: "--dependency=afterany:{jobs}"

  # Array jobs (use {array} as placeholder for the expanded pattern)
  array_flag: "--array={array}"

  # Resource flags (use {value} as placeholder)
  resource_flags:
    partition:    "--partition={value}"
    nodes:        "--nodes={value}"
    ntasks:       "--ntasks={value}"
    cpus_per_task: "--cpus-per-task={value}"
    time:         "--time={value}"
    mem:          "--mem={value}"
    mem_per_cpu:  "--mem-per-cpu={value}"
    job_name:     "--job-name={value}"
    output:       "--output={value}"
    error:        "--error={value}"

  # Job monitoring
  status_cmd: squeue
  status_args: ["--noheader", "--format=%i %T"]
  active_states: [PENDING, RUNNING]

  # Job cancellation
  cancel_cmd: scancel

# PBS/Torque
# To use PBS: change `scheduler` above to `pbs` and adjust values below.
#
# pbs:
#   submit_cmd: qsub
#   job_id_parse: first_word        # qsub prints "12345.cluster.example.com"
#   dependency_flag: "-W depend=afterany:{jobs}"
#   array_flag: "-J 1-{array}"
#   resource_flags:
#     partition:     "-q {value}"   # PBS calls this a queue
#     nodes:         "-l nodes={value}"
#     ntasks:        ""             # not a standalone flag in PBS
#     cpus_per_task: "-l ncpus={value}"
#     time:          "-l walltime={value}"
#     mem:           "-l mem={value}"
#     mem_per_cpu:   ""
#     job_name:      "-N {value}"
#     output:        "-o {value}"
#     error:         "-e {value}"
#   status_cmd: qstat
#   active_states: [Q, R, H]
#   cancel_cmd: qdel